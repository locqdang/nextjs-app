name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-check:
    # Protect self-hosted runner from untrusted fork PR code execution.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, linux, x64]

    env:
      STRAPI_URL: ${{ vars.STRAPI_URL || secrets.STRAPI_URL }}
      STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
      MONGO_URI: ${{ secrets.MONGO_URI }}
      MONGO_DB: ${{ vars.MONGO_DB }}
      MONGO_HARO_DB: ${{ vars.MONGO_HARO_DB }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_CALLBACK_URL: ${{ vars.GOOGLE_CALLBACK_URL }}
      N8N_LOGIN_WEBHOOK_URL: ${{ secrets.N8N_LOGIN_WEBHOOK_URL }}
      NEXT_PUBLIC_FRONTEND_URL: ${{ vars.NEXT_PUBLIC_FRONTEND_URL }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Build app
        run: npm run build
        env:
          NODE_ENV: production
